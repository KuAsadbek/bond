<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-ru="Оплата билета | Bond and Data" data-uz="Chipta to'lovi | Bond and Data">Оплата билета | Bond and
        Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0a0a0f;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-gradient {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('/static/public/img/img-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(10, 10, 15, 0.7) 0%, rgba(10, 10, 15, 0.85) 100%);
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: floatOrb 15s ease-in-out infinite;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15));
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, rgba(240, 147, 251, 0.1), rgba(245, 87, 108, 0.1));
            bottom: -150px;
            right: -150px;
            animation-delay: 5s;
        }

        @keyframes floatOrb {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -30px) scale(1.05);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.95);
            }
        }

        /* Main Content */
        .main-content {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 40px;
        }

        .logo {
            height: 45px;
            filter: drop-shadow(0 4px 15px rgba(102, 126, 234, 0.3));
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Payment Section */
        .payment-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .payment-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .payment-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #667eea);
            background-size: 300% 100%;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 300% 50%;
            }
        }

        .ticket-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: 0 auto 30px;
        }

        .payment-title {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 15px;
        }

        .payment-desc {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .price-box {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 35px;
        }

        .price-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .price-amount {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a8b4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .price-currency {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            margin-left: 5px;
        }

        /* Payment Buttons */
        .payment-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .pay-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px 30px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .pay-btn-payme {
            background: linear-gradient(135deg, #00CCCC 0%, #00AAAA 100%);
            color: #fff;
            box-shadow: 0 8px 30px rgba(0, 204, 204, 0.3);
        }

        .pay-btn-payme:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 204, 204, 0.4);
        }

        .pay-btn-payme .pay-btn-logo {
            width: 28px;
            height: 28px;
        }

        .pay-btn-click {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            cursor: not-allowed;
            position: relative;
        }

        .pay-btn-click .coming-soon {
            position: absolute;
            right: 15px;
            font-size: 11px;
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
            padding: 5px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pay-btn-click .pay-btn-logo {
            width: 28px;
            height: 28px;
            opacity: 0.4;
        }

        /* Loading state */
        .pay-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .pay-btn.loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Security note */
        .security-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }

        .security-note svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav {
                padding: 20px;
            }

            .payment-card {
                padding: 35px 25px;
            }

            .payment-title {
                font-size: 24px;
            }

            .price-amount {
                font-size: 32px;
            }

            .pay-btn {
                padding: 18px 25px;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .back-btn span {
                display: none;
            }

            .ticket-icon {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }
        }
    </style>
</head>

<body>
    {% load static %}

    <div class="bg-container">
        <div class="bg-gradient"></div>
        <div class="bg-overlay"></div>
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
    </div>

    <div class="main-content">
        <!-- Navigation -->
        <nav class="nav">
            <a href="{% url 'public:profile' %}">
                <img src="{% static 'public/img/logo-1.png' %}" alt="Bond and Data" class="logo">
            </a>
            <a href="{% url 'public:profile' %}" class="back-btn">
                ← <span data-ru="Назад" data-uz="Orqaga">Назад</span>
            </a>
        </nav>

        <!-- Payment Section -->
        <div class="payment-section">
            <div class="payment-card">
                <div class="ticket-icon">🎫</div>

                <h1 class="payment-title" data-ru="Оплата билета" data-uz="Chipta to'lovi">Оплата билета</h1>

                <p class="payment-desc"
                    data-ru="Для доступа к просмотру и скачиванию вашего билета необходимо произвести оплату"
                    data-uz="Chiptangizni ko'rish va yuklab olish uchun to'lov amalga oshiring">
                    Для доступа к просмотру и скачиванию вашего билета необходимо произвести оплату
                </p>

                {% if olympiad and olympiad.ticket_price > 0 %}
                <div class="price-box">
                    <div class="price-label" data-ru="Стоимость билета" data-uz="Chipta narxi">Стоимость билета</div>
                    <div>
                        <span class="price-amount">{{ olympiad.ticket_price|floatformat:0 }}</span>
                        <span class="price-currency" data-ru="сум" data-uz="so'm">сум</span>
                    </div>
                </div>
                {% endif %}

                <div class="payment-buttons">
                    <button id="payme-btn" class="pay-btn pay-btn-payme" onclick="initiatePayment()">
                        <svg class="pay-btn-logo" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
                        </svg>
                        <span data-ru="Оплатить через Payme" data-uz="Payme orqali to'lash">Оплатить через Payme</span>
                    </button>

                    <button class="pay-btn pay-btn-click" disabled>
                        <svg class="pay-btn-logo" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
                        </svg>
                        <span data-ru="Оплатить через Click" data-uz="Click orqali to'lash">Оплатить через Click</span>
                        <span class="coming-soon" data-ru="Скоро" data-uz="Tez kunda">Скоро</span>
                    </button>
                </div>

                <div class="security-note">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z" />
                    </svg>
                    <span data-ru="Безопасная оплата через платежную систему"
                        data-uz="To'lov tizimi orqali xavfsiz to'lov">Безопасная оплата через платежную систему</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function setLanguage(lang) {
            localStorage.setItem('lang', lang);
            document.querySelectorAll('[data-ru]').forEach(el => {
                el.textContent = el.getAttribute('data-' + lang);
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            const savedLang = localStorage.getItem('lang') || 'ru';
            setLanguage(savedLang);
            
            // Check if returned from payment (referrer contains paycom/payme)
            const referrer = document.referrer.toLowerCase();
            const urlParams = new URLSearchParams(window.location.search);
            const fromPayme = referrer.includes('paycom') || 
                              referrer.includes('payme') || 
                              urlParams.has('payment_callback') ||
                              sessionStorage.getItem('payment_initiated');
            
            if (fromPayme) {
                startPaymentStatusPolling();
            }
        });

        let pollingInterval = null;
        let pollCount = 0;
        const MAX_POLLS = 30; // Max 60 seconds (30 * 2 seconds)

        function startPaymentStatusPolling() {
            const btn = document.getElementById('payme-btn');
            const savedLang = localStorage.getItem('lang') || 'ru';
            
            // Show loading state with message
            btn.classList.add('loading');
            btn.disabled = true;
            btn.querySelector('span[data-ru]').textContent = savedLang === 'ru' 
                ? 'Проверка оплаты...' 
                : "To'lov tekshirilmoqda...";
            
            checkPaymentStatus();
            pollingInterval = setInterval(checkPaymentStatus, 2000);
        }

        async function checkPaymentStatus() {
            pollCount++;
            
            if (pollCount > MAX_POLLS) {
                stopPolling();
                const btn = document.getElementById('payme-btn');
                btn.classList.remove('loading');
                btn.disabled = false;
                const savedLang = localStorage.getItem('lang') || 'ru';
                btn.querySelector('span[data-ru]').textContent = savedLang === 'ru' 
                    ? 'Оплатить через Payme' 
                    : "Payme orqali to'lash";
                sessionStorage.removeItem('payment_initiated');
                return;
            }
            
            try {
                const response = await fetch('/api/payment/status/', {
                    method: 'GET',
                    credentials: 'same-origin'
                });
                
                const data = await response.json();
                
                if (data.success && data.is_paid) {
                    stopPolling();
                    sessionStorage.removeItem('payment_initiated');
                    // Payment confirmed, redirect to ticket
                    window.location.href = '/ticket/';
                }
            } catch (error) {
                console.error('Status check error:', error);
            }
        }

        function stopPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
        }

        async function initiatePayment() {
            const btn = document.getElementById('payme-btn');

            // Add loading state
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const response = await fetch('/api/payment/initiate/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'same-origin'
                });

                const data = await response.json();

                if (data.success && data.pay_url) {
                    // Mark that payment was initiated
                    sessionStorage.setItem('payment_initiated', 'true');
                    // Redirect to Payme checkout
                    window.location.href = data.pay_url;
                } else {
                    alert(data.error || 'Произошла ошибка при создании платежа');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Payment error:', error);
                alert('Произошла ошибка при соединении с сервером');
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
